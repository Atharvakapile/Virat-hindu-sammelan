<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विराट हिंदू संमेलन | Live Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        .slider-img, .mini-slider-img { transition: opacity 1s ease-in-out; position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        #lang-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(12, 10, 9, 0.98);
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(15px);
        }
        html { scroll-behavior: smooth; }

        /* Timeline Styles for Single Item */
        .timeline-container { position: relative; padding: 20px 0; }
        .timeline-item { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
        .timeline-content { width: 90%; max-width: 500px; position: relative; transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-stone-50 font-sans text-stone-900 overflow-x-hidden">

    <!-- LANGUAGE SELECTION OVERLAY -->
    <div id="lang-overlay">
        <div class="text-center p-8 glass-card rounded-[3rem] border-orange-500/30 max-w-sm w-full mx-4 text-stone-900 shadow-2xl">
            <div class="bg-orange-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-orange-600/40 text-white">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
            </div>
            <h2 class="text-2xl font-black mb-2">निवड करा / Select</h2>
            <p class="text-stone-500 text-sm mb-8 font-medium">कृपया तुमची भाषा निवडा<br>Please select your language</p>
            <div class="space-y-3">
                <button onclick="selectLang('mr')" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-2xl transition-all active:scale-95 shadow-xl">मराठी (Marathi)</button>
                <button onclick="selectLang('en')" class="w-full bg-white hover:bg-stone-50 text-stone-800 border border-stone-200 font-black py-4 rounded-2xl transition-all active:scale-95">English</button>
            </div>
        </div>
    </div>

    <!-- HERO SLIDER -->
    <section class="relative h-[60vh] md:h-[85vh] w-full overflow-hidden bg-stone-900">
        <div id="slider" class="w-full h-full">
            <img src="image.png" class="slider-img opacity-100" alt="Slider 1">
            <img src="image1.jpeg" class="slider-img opacity-0" alt="Slider 2">
            <img src="image2.jpeg" class="slider-img opacity-0" alt="Slider 3">
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-stone-50 via-transparent to-black/20"></div>
    </section>

    <!-- BRANDING SECTION -->
    <div class="max-w-4xl mx-auto pt-10 text-center px-6">
        <h1 id="main-title" class="text-5xl md:text-8xl font-black text-stone-900 leading-none tracking-tighter uppercase">
            विराट हिंदू संमेलन
        </h1>
        <p id="organizer-tag" class="mt-4 text-orange-600 font-black uppercase tracking-[0.1em] text-sm md:text-xl">
            आयोजक: सकल विद्यानगर हिंदू समिती
        </p>
        <div class="w-24 h-2 bg-orange-500 mx-auto mt-6 rounded-full"></div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="max-w-4xl mx-auto px-4 py-10 pb-32 space-y-24">

        <!-- TIMELINE SECTION (ONLY 27th MARCH) -->
        <section id="schedule-section" class="space-y-12 animate-in fade-in duration-700">
            <h2 class="text-3xl font-black text-stone-900 tracking-tighter uppercase trans-schedule-title text-center">Event Date</h2>
            <div class="timeline-container">
                <div id="timeline-list"></div>
            </div>
        </section>

        <!-- SNEHABHOJAN NOTICE -->
        <section id="food-section" class="space-y-6">
            <!-- INCREASED HEIGHT MINI SLIDER -->
            <div id="mini-slider" class="relative h-[400px] md:h-[500px] w-full overflow-hidden rounded-[2.5rem] shadow-2xl border-4 border-white">
                <img src="image3.jpg" class="mini-slider-img opacity-100">
                <img src="image4.png" class="mini-slider-img opacity-0">
                <img src="image5.jpeg" class="mini-slider-img opacity-0">
                
                <div class="absolute bottom-10 left-0 right-0 text-center z-10">
                    <span class="bg-orange-600/90 text-white px-8 py-3 rounded-full font-black text-2xl shadow-2xl backdrop-blur-sm">
                        विराट हिंदू संमेलन
                    </span>
                </div>
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
            </div>

            <div class="bg-orange-600 text-white rounded-[3rem] p-10 shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-3xl font-black uppercase tracking-tighter trans-food-title">🍛 Snehabhojan</h2>
                    <p id="mahaprasad-text" class="text-lg font-medium mt-4 leading-relaxed opacity-95"></p>
                </div>
                <div class="absolute -right-10 -bottom-10 opacity-10"><svg width="200" height="200" viewBox="0 0 24 24" fill="currentColor"><path d="M11 9H9V2H7V9H5V2H3V9C3 11.12 4.66 12.84 6.75 12.97V22H9.25V12.97C11.34 12.84 13 11.12 13 9V2H11V9ZM16 6V14H18.5V22H21V2H16C16 4.21 16 6 16 6Z"/></svg></div>
            </div>
        </section>

        <!-- WHATSAPP & IMPERIUM SECTION -->
        <div class="pt-8 text-center">
            <a href="https://chat.whatsapp.com/I3vkHAXjNf406MnZ5sAWW7" target="_blank" class="flex items-center justify-center gap-4 w-full bg-[#25D366] hover:bg-[#128C7E] text-white py-6 rounded-[2.5rem] font-black text-xl shadow-2xl transition-all active:scale-95 shadow-green-200">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                <span class="trans-whatsapp">JOIN WHATSAPP GROUP</span>
            </a>

            <div class="mt-14 mb-6">
                <p class="text-stone-400 text-xl font-bold uppercase tracking-[0.2em] mb-1">Made by</p>
                <h2 class="text-5xl md:text-7xl font-black text-orange-600 tracking-tighter leading-none">IMPERIUM</h2>
            </div>

            <p class="text-stone-400 text-[10px] font-bold uppercase tracking-[0.3em] mt-10 trans-copyright opacity-60 italic text-center">विराट हिंदू संमेलन • २०२६</p>
            
            <div class="flex items-center justify-center gap-6 text-stone-500 text-xs font-black uppercase tracking-widest mt-6">
                <a href="https://imperiumofficial.in" target="_blank" class="hover:text-orange-500 transition-all border-b-2 border-transparent hover:border-orange-500 pb-1">ImperiumOfficial</a>
                <span class="opacity-20 text-lg">|</span>
                <a href="https://imperiumtrust.org" target="_blank" class="hover:text-orange-500 transition-all border-b-2 border-transparent hover:border-orange-500 pb-1">ImperiumTrust</a>
            </div>
        </div>
    </main>

    <footer class="bg-stone-900 py-16 px-6 text-center border-t border-stone-800">
        <h2 id="footer-title" class="text-2xl font-black text-white tracking-tighter mb-4 uppercase">विराट हिंदू संमेलन</h2>
        <p class="text-stone-500 text-[10px] font-bold uppercase tracking-[0.3em] trans-copyright mb-6"></p>
    </footer>

    <script type="module">
        const LANG_DATA = {
            en: {
                mainTitle: 'VIRAT HINDU <span class="text-orange-500">SAMMELAN</span>', 
                organizer: 'Organizer: Sakal Vidyanagar Hindu Samiti',
                footerTitle: 'VIRAT HINDU SAMMELAN',
                scheduleTitle: "Event Timeline",
                foodTitle: "🍛 Snehabhojan", 
                mahaprasad: "On 27th March, a Grand Snehabhojan will be held for all devotees at Ashtavinayak Mitra Mandal, Lane 11 (Panyachya Taki Javal), Ganpati Mandir at 7:30 PM.",
                whatsapp: "Join WhatsApp Group", 
                copyright: "Virat Hindu Sammelan • 2026"
            },
            mr: {
                mainTitle: 'विराट हिंदू <span class="text-orange-500">संमेलन</span>', 
                organizer: 'आयोजक: सकल विद्यानगर हिंदू समिती',
                footerTitle: 'विराट हिंदू संमेलन',
                scheduleTitle: "प्रमुख कार्यक्रमाची तारीख",
                foodTitle: "🍛 स्नेहभोजन", 
                mahaprasad: "२७ मार्च रोजी, Lane 11 अष्टविनायक मित्र मंडळ (पाण्याच्या टाकी जवळ), गणपती मंदिर येथे संध्याकाळी ७:३० वाजता स्नेहभोजनाचे आयोजन करण्यात आले आहे.",
                whatsapp: "व्हॉट्सॲप ग्रुपला जॉईन व्हा", 
                copyright: "विराट हिंदू संमेलन • २०२६"
            }
        };

        const DATA = {
            en: {
                schedule: [
                    { date: "27", month: "March", title: "Virat Hindu Sammelan", desc: "Main gathering and Snehabhojan at Lane 11 Ganpati Mandir." }
                ]
            },
            mr: {
                schedule: [
                    { date: "२७", month: "मार्च", title: "विराट हिंदू संमेलन", desc: "मुख्य संमेलन आणि स्नेहभोजन Lane ११ गणपती मंदिर येथे आयोजित." }
                ]
            }
        };

        let currentLang = 'mr';

        window.selectLang = (l) => {
            currentLang = l;
            document.getElementById('lang-overlay').style.display = 'none';
            updateUIStrings();
            initDynamicContent();
        };

        function updateUIStrings() {
            const L = LANG_DATA[currentLang];
            document.getElementById('main-title').innerHTML = L.mainTitle;
            document.getElementById('organizer-tag').innerText = L.organizer;
            document.getElementById('footer-title').innerText = L.footerTitle;
            document.querySelector('.trans-schedule-title').innerText = L.scheduleTitle;
            document.querySelector('.trans-food-title').innerText = L.foodTitle;
            document.getElementById('mahaprasad-text').innerText = L.mahaprasad;
            document.querySelector('.trans-whatsapp').innerText = L.whatsapp.toUpperCase();
            document.querySelectorAll('.trans-copyright').forEach(el => el.innerText = L.copyright);
        }

        function initDynamicContent() {
            const D = DATA[currentLang];
            const sList = document.getElementById('timeline-list');
            sList.innerHTML = D.schedule.map((s) => `
                <div class="timeline-item">
                    <div class="timeline-content bg-white p-10 rounded-[2.5rem] shadow-xl border border-white text-center">
                        <div class="flex flex-col items-center gap-4 mb-4">
                            <span class="text-6xl font-black text-orange-500">${s.date}</span>
                            <div><p class="font-black uppercase text-stone-900 text-2xl leading-none">${s.month}</p></div>
                        </div>
                        <h4 class="font-black text-stone-800 text-2xl uppercase tracking-tight mb-4">${s.title}</h4>
                        <p class="text-stone-600 text-lg font-medium leading-relaxed">${s.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        // Hero Slider
        let slideIdx = 0;
        setInterval(() => {
            const imgs = document.querySelectorAll('.slider-img');
            if(imgs.length > 0) {
                imgs.forEach((img, i) => img.style.opacity = (i === slideIdx) ? '1' : '0');
                slideIdx = (slideIdx + 1) % imgs.length;
            }
        }, 2000);

        // Mini Slider
        let miniIdx = 0;
        setInterval(() => {
            const mImgs = document.querySelectorAll('.mini-slider-img');
            if(mImgs.length > 0) {
                mImgs.forEach((img, i) => img.style.opacity = (i === miniIdx) ? '1' : '0');
                miniIdx = (miniIdx + 1) % mImgs.length;
            }
        }, 2000);
    </script>
</body>
</html>
